server.port=8081

# ── Groq API (https://console.groq.com) ──────────────────────────────
groq.api.key=${GROQ_API_KEY:YOUR_GROQ_KEY_HERE}
groq.model=llama-3.3-70b-versatile

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── MySQL DataSource ─────────────────────────────────────────────────────
# Override via env vars in production:
#   SPRING_DATASOURCE_URL=jdbc:mysql://host:3306/rationchain
#   SPRING_DATASOURCE_USERNAME=your_user
#   SPRING_DATASOURCE_PASSWORD=your_password
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rationchain?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' preserves data across restarts; use 'create' to reset on first run
spring.jpa.hibernate.ddl-auto=create
# Run data.sql after Hibernate creates/updates schema
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

rationchain.seed.demo-data=true

# ── API Security ────────────────────────────────────────────────────────
# Override in production via: -Dapp.api.master-key=<secret>
# or environment variable: APP_API_MASTER_KEY=<secret>
app.api.master-key=${APP_API_MASTER_KEY:DEMO-ANNASURAKSHA-2025}

# ── Async thread pool (for audit log writes) ────────────────────────────
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=200
spring.task.execution.thread-name-prefix=audit-log-

# ── JPA tuning for national-scale read queries ──────────────────────────
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Actuator (health + metrics for monitoring) ──────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
